<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账号管理 - Codex</title>
    <link rel="stylesheet" href="/static/css/style.css?v={{ static_version }}">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23007AFF'/><circle cx='50' cy='50' r='20' fill='white'/></svg>">
    <style>
        .password-cell {
            font-family: var(--font-mono);
            font-size: 13px;
        }

        .toolbar {
            display: flex;
            gap: 16px;
            align-items: center;
            justify-content: space-between;
        }

        .toolbar-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="nav-brand">
                <h1>CPA-Codex-Manager</h1>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link">账号注册</a>
                <a href="/accounts" class="nav-link active">账号管理</a>
                <a href="/cliproxy-cleaner" class="nav-link">CPA 检测</a>
                <a href="/email-services" class="nav-link">邮箱服务</a>
                <a href="/settings" class="nav-link">系统设置</a>
                <a href="/logout" class="nav-link">退出</a>
            </div>
            <button class="theme-toggle" onclick="theme.toggle()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5" />
                    <path
                        d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                </svg>
            </button>
        </nav>

        <main class="container main-content">
            <div class="page-header">
                <h2>账号管理</h2>
                <p class="subtitle">查看和管理所有已注册的账号</p>
            </div>

            <!-- 统计概览 -->
            <div class="stats-grid" style="grid-template-columns: repeat(5, 1fr);">
                <div class="stat-card">
                    <div class="stat-value" id="total-accounts">0</div>
                    <div class="stat-label">总账号数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="active-accounts" style="color: #34C759;">0</div>
                    <div class="stat-label">活跃账号</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="expired-accounts" style="color: #FF9500;">0</div>
                    <div class="stat-label">已过期</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="banned-accounts" style="color: #8E8E93;">0</div>
                    <div class="stat-label">已封禁</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="failed-accounts" style="color: #FF3B30;">0</div>
                    <div class="stat-label">失效账号</div>
                </div>
            </div>

            <!-- 工具栏 -->
            <div class="card" style="margin-bottom: 32px;">
                <div class="card-body toolbar" style="padding: 16px 32px;">
                    <div class="toolbar-group">
                        <div class="filter-group" style="display: flex; gap: 12px; align-items: center;">
                            <input type="text" id="search-email" placeholder="输入邮箱搜索..." class="input"
                                style="width: 180px;">
                            <select id="filter-service" class="input" style="width: 110px;">
                                <option value="">所有邮箱</option>
                                <option value="outlook">Outlook</option>
                                <option value="moe_mail">MoeMail</option>
                                <option value="temp_mail">Temp-Mail</option>
                                <option value="duck_mail">DuckMail</option>
                                <option value="freemail">Freemail</option>
                                <option value="cloud_mail">CloudMail</option>
                                <option value="imap_mail">IMAP</option>
                            </select>
                            <select id="filter-status" class="input" style="width: 100px;">
                                <option value="">所有状态</option>
                                <option value="active">活跃</option>
                                <option value="expired">过期</option>
                                <option value="banned">已封禁</option>
                                <option value="failed">失效</option>
                            </select>
                            <div class="toggle-group"
                                style="margin-left: 8px; display: flex; align-items: center; gap: 8px;">
                                <span style="font-size: 13px; color: var(--text-secondary);">仅未同步 CPA</span>
                                <label class="switch">
                                    <input type="checkbox" id="filter-cpa-toggle">
                                    <span class="slider round"></span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="toolbar-group">
                        <button class="btn btn-secondary btn-sm" id="refresh-btn">刷新列表</button>
                        <button class="btn btn-secondary btn-sm" id="batch-refresh-btn" disabled>刷新 Token</button>
                        <button class="btn btn-secondary btn-sm" id="batch-validate-btn" disabled>验证 Token</button>
                        <button class="btn btn-secondary btn-sm" id="batch-upload-btn" disabled>上传至 CPA</button>
                        <button class="btn btn-danger btn-sm" id="batch-delete-btn" disabled>批量删除</button>

                        <div class="dropdown">
                            <button class="btn btn-primary btn-sm" id="export-btn" disabled>导出数据</button>
                            <div class="dropdown-menu" id="export-menu">
                                <a href="#" class="dropdown-item" data-format="json">导出 JSON</a>
                                <a href="#" class="dropdown-item" data-format="csv">导出 CSV</a>
                                <a href="#" class="dropdown-item" data-format="cpa">CPA 格式</a>
                                <a href="#" class="dropdown-item" data-format="sub2api">Sub2Api 格式</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 数据表格 -->
            <div class="card">
                <div class="card-body" style="padding: 0;">
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th style="width: 48px;"><input type="checkbox" id="select-all"></th>
                                    <th style="width: 60px;">ID</th>
                                    <th>邮箱</th>
                                    <th style="width: 120px;">密码</th>
                                    <th style="width: 100px;">服务商</th>
                                    <th style="width: 80px;">状态</th>
                                    <th style="width: 60px;">CPA</th>
                                    <th style="width: 150px;">同步时间</th>
                                    <th style="width: 160px;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="accounts-table">
                                <!-- 动态加载 -->
                            </tbody>
                        </table>
                    </div>

                    <!-- 分页控制 -->
                    <div id="pagination-container"
                        style="padding: 24px 32px; display: flex; justify-content: center; align-items: center; gap: 8px; border-top: 1px solid var(--border);">
                        <!-- 动态渲染分页 -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 详情模态框 -->
    <div class="modal" id="detail-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>账号详情</h3>
                <button class="modal-close-btn" id="close-modal">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <div class="modal" id="cpa-service-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>选择 CPA 平台</h3>
                <button class="modal-close-btn" id="close-cpa-modal">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div id="cpa-service-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" id="cancel-cpa-modal-btn">取消</button>
                    <button class="btn btn-primary" id="cpa-use-global-btn">使用全局配置</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="sub2api-service-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Sub2API 服务</h3>
                <button class="modal-close-btn" id="close-sub2api-modal">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div id="sub2api-service-list"></div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" id="cancel-sub2api-modal-btn">取消</button>
                    <button class="btn btn-primary" id="sub2api-use-auto-btn">自动选择</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="tm-service-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Team Manager</h3>
                <button class="modal-close-btn" id="close-tm-modal">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div id="tm-service-list"></div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" id="cancel-tm-modal-btn">取消</button>
                    <button class="btn btn-primary" id="tm-use-auto-btn">自动选择</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/utils.js?v={{ static_version }}"></script>
    <script src="/static/js/accounts.js?v={{ static_version }}"></script>
</body>

</html>
