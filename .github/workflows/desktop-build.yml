name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow

      - name: Build macOS DMG
        run: |
          chmod +x scripts/build_macos_dmg.sh
          ./scripts/build_macos_dmg.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CPA-Codex-Manager-macOS
          path: |
            dist/CPA Codex Manager.app
            dist/CPA Codex Manager.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow

      - name: Build Windows package
        shell: cmd
        run: scripts\build_windows.bat

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CPA-Codex-Manager-Windows
          path: |
            dist/CPA Codex Manager/**
            dist/CPA Codex Manager.exe